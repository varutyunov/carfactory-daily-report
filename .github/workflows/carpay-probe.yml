name: CarPay CSV Probe (one-shot)

# One-shot probe to discover the CSV-export URLs on dealers.carpay.com.
# Runs the carpay-probe-csv.js script with the existing GitHub Secrets.
# Manual trigger only — delete this workflow file once the URLs are captured.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install node-fetch@2
      - run: node scripts/carpay-probe-csv.js
        env:
          CARPAY_EMAIL: ${{ secrets.CARPAY_EMAIL }}
          CARPAY_PASSWORD: ${{ secrets.CARPAY_PASSWORD }}
          CARPAY_DEBARY_ID: ${{ secrets.CARPAY_DEBARY_ID }}
          CARPAY_DELAND_ID: ${{ secrets.CARPAY_DELAND_ID }}
