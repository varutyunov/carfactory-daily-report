name: Inventory Sync

on:
  push:
    paths:
      - 'InventoryMaster.csv'
      - 'InventoryMasterDeLand.csv'
      - 'InventoryMasterDeland.csv'
    branches: [main, master]
  schedule:
    # Every 2 hours during business hours (Mon-Sat, 8am-8pm ET = 12-24 UTC)
    - cron: '30 12,14,16,18,20,22,0 * * 1-6'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install node-fetch@2
      - run: node scripts/inventory-sync.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Re-validate pending payment_reviews against current sheet state.
      # Auto-resolves any whose underlying issue is gone (post landed via
      # another path, phantom line removed, wrong-lot fixed). Keeps the
      # queue from accumulating ghost cards. Non-fatal on errors —
      # surfacing one stale card is safer than skipping the inventory pass.
      - run: python scripts/review_revalidate.py --apply
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
        continue-on-error: true
      # Refresh csv_accounts master from latest payments + sold-inventory
      # CSVs. Idempotent upsert. Provides the source-of-truth account
      # database that deal_account_links and audit_2026.py join against.
      - run: python scripts/sync_csv_accounts.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
        continue-on-error: true
