name: GPS Sync — Passtime OASIS

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run GPS Sync
        run: node scripts/gps-sync.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PASSTIME_ACCOUNT: ${{ secrets.PASSTIME_ACCOUNT }}
          PASSTIME_USER: ${{ secrets.PASSTIME_USER }}
          PASSTIME_PASS: ${{ secrets.PASSTIME_PASS }}
