name: Inventory Master CSV Sync

# Promotes the newest dealer export in `Inventory/DeBary/` or
# `Inventory/Deland/` to `InventoryMaster.csv` / `InventoryMasterDeland.csv`
# at the repo root. The root files are what the app fetches via
# raw.githubusercontent — promoting them lets the app's CSV sync
# detect new vehicles and lot moves and queue inv_create_pending /
# inv_relocate_pending review cards (Approve-First v592 flow).
#
# Trigger: any push that adds/modifies a file under `Inventory/**/*.csv`,
# or on-demand via the Actions tab (workflow_dispatch).

on:
  push:
    paths:
      - 'Inventory/**/*.csv'
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the commit back to main/master pushes cleanly
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pick newest CSV per location and copy to repo root
        shell: bash
        run: |
          set -e
          changed=0

          # DeBary: Inventory/DeBary/*.csv -> InventoryMaster.csv
          dir="Inventory/DeBary"
          dest="InventoryMaster.csv"
          if [ -d "$dir" ]; then
            # Newest by filename (exports are named InventoryMaster YYYYMMDDHHmm-Company-...,
            # so a lexicographic sort puts the latest last).
            newest="$(ls -1 "$dir"/*.csv 2>/dev/null | sort | tail -1 || true)"
            if [ -n "$newest" ]; then
              echo "Promoting: $newest -> $dest"
              if ! cmp -s "$newest" "$dest"; then
                cp "$newest" "$dest"
                changed=1
                git add "$dest"
              else
                echo "  (no changes — $dest already matches)"
              fi
            else
              echo "No CSV in $dir"
            fi
          else
            echo "No $dir folder — skipping"
          fi

          # Deland: Inventory/Deland/*.csv -> InventoryMasterDeland.csv
          dir="Inventory/Deland"
          dest="InventoryMasterDeland.csv"
          if [ -d "$dir" ]; then
            newest="$(ls -1 "$dir"/*.csv 2>/dev/null | sort | tail -1 || true)"
            if [ -n "$newest" ]; then
              echo "Promoting: $newest -> $dest"
              if ! cmp -s "$newest" "$dest"; then
                cp "$newest" "$dest"
                changed=1
                git add "$dest"
              else
                echo "  (no changes — $dest already matches)"
              fi
            else
              echo "No CSV in $dir"
            fi
          else
            echo "No $dir folder — skipping"
          fi

          if [ "$changed" = "1" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Auto: promote newest Inventory Master CSV to repo root"
            # Push to BOTH branches so master never drifts behind main.
            git push origin HEAD:main HEAD:master
          else
            echo "No CSV changes to commit."
          fi
