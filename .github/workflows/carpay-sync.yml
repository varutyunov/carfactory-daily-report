name: CarPay Sync

# Phase 1 sync: 4 HTTP requests per run (2 list pages per location) —
# no per-customer detail hits. Old paused scraper did ~400/run and CarPay
# flagged the load.

on:
  schedule:
    # UTC: 12, 14, 16, 18, 20, 22, 00 on Mon-Sat → ~every 2 hrs business day.
    - cron: '0 12,14,16,18,20,22,0 * * 1-6'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install node-fetch@2
      - run: node scripts/carpay-sync.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CARPAY_EMAIL: ${{ secrets.CARPAY_EMAIL }}
          CARPAY_PASSWORD: ${{ secrets.CARPAY_PASSWORD }}
          CARPAY_DEBARY_ID: ${{ secrets.CARPAY_DEBARY_ID }}
          CARPAY_DELAND_ID: ${{ secrets.CARPAY_DELAND_ID }}
